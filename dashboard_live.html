<!DOCTYPE html>
<html>
<head>
    <title>Nandi AEGIS — Live Dashboard</title>
    <style>
        body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        img { max-width: 100%; height: auto; }
        #status { position: fixed; top: 10px; right: 15px; color: #4cc9f0; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>
    <img id="dash" src="training_dashboard.png" />
    <div id="status">Live</div>
    <script>
        setInterval(() => {
            document.getElementById('dash').src = 'training_dashboard.png?' + Date.now();
            document.getElementById('status').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        }, 5000);
    </script>
</body>
</html>
